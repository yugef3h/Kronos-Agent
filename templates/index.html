<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>前端实现 mini-GPT</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    #status { color: #666; margin: 1rem 0; }
    #output { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 8px; }
    button { padding: 0.5rem 1rem; cursor: pointer; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>mini-GPT</h1>
  <div id="status">初始化中...</div>
  <input type="text" id="prompt" placeholder="输入提示词，如：我是前端工程师，" style="width: 100%; padding: 0.5rem; margin: 1rem 0;">
  <button onclick="generateText()">生成文本</button>
  <div id="output"></div>

  <!-- 最新v4 CDN（ES Module） -->
  <script type="module" src="./app.js"></script>
</body>
</html>
